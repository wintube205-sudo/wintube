<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>WinTube</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--red:#ff2d2d;--dark:#0a0a0a;--card:#111;--border:#1e1e1e;--text:#f0f0f0;--muted:#666;--green:#22c55e;--yellow:#f59e0b;--purple:#a855f7;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{background:var(--dark);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(10,10,10,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1rem;height:60px;display:flex;align-items:center;gap:.75rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--red);letter-spacing:3px;flex-shrink:0;line-height:1;}
.logo span{color:var(--text);}
.search-bar{flex:1;display:flex;max-width:500px;}
.search-bar input{flex:1;background:var(--card);border:1px solid var(--border);border-left:none;color:var(--text);padding:.55rem .9rem;font-family:'Cairo',sans-serif;font-size:max(.88rem,16px);outline:none;border-radius:0 8px 8px 0;min-width:0;}
.search-bar input:focus{border-color:var(--red);}
.search-bar button{background:var(--red);border:none;color:#fff;padding:0 .9rem;cursor:pointer;font-size:.95rem;border-radius:8px 0 0 8px;flex-shrink:0;}
.user-panel{margin-right:auto;display:flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:.3rem .75rem;cursor:pointer;flex-shrink:0;transition:border-color .2s;}
.user-panel:hover{border-color:var(--red);}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--red),#ff8c00);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff;flex-shrink:0;}
.user-name{font-size:.78rem;font-weight:600;}
.user-pts{font-size:.7rem;color:var(--yellow);}
.hbtn{border:none;color:#fff;border-radius:50px;padding:.33rem .85rem;font-family:'Cairo',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.hbtn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);}
.hbtn-red{background:linear-gradient(135deg,#ef4444,#b91c1c);}

/* CATEGORIES */
.categories{padding:.6rem 1rem;display:flex;gap:.4rem;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.categories::-webkit-scrollbar{display:none;}
.cat-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.35rem .9rem;border-radius:50px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.8rem;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.cat-btn:hover,.cat-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

/* MAIN */
main{padding:1.25rem 1rem;}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;}
.section-title::before{content:'';width:4px;height:1.2em;background:var(--red);border-radius:2px;flex-shrink:0;}

/* VIDEO GRID */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr));gap:1rem;}
.video-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;}
.video-card:hover{transform:translateY(-3px);border-color:var(--red);}
.thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.play-ov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.video-card:hover .play-ov{opacity:1;}
.play-btn{width:46px;height:46px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.play-btn svg{fill:#fff;margin-right:-2px;}
.card-info{padding:.7rem .85rem;}
.card-title{font-size:.85rem;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.35rem;}

/* GAMES */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));gap:1rem;}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative;}
.game-card:hover{transform:translateY(-3px);border-color:var(--purple);}
.game-thumb{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;}
.game-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.game-card:hover .game-ov{opacity:1;}
.game-play{width:46px;height:46px;background:var(--purple);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.game-info{padding:.7rem .85rem;}
.game-name{font-size:.88rem;font-weight:700;margin-bottom:.3rem;text-align:center;}

/* AUTH */
.auth-ov{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9000;display:flex;align-items:center;justify-content:center;padding:1rem;}
.auth-ov.hidden{display:none;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:2rem 1.5rem;width:100%;max-width:390px;}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--red);letter-spacing:4px;text-align:center;}
.auth-logo span{color:var(--text);}
.a-inp{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--text);padding:.72rem .9rem;font-family:'Cairo',sans-serif;font-size:max(.9rem,16px);border-radius:10px;outline:none;display:block;margin-bottom:.7rem;text-align:right;}
.a-sub{width:100%;background:var(--red);border:none;color:#fff;padding:.8rem;border-radius:10px;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}

/* MODALS */
.modal-ov,.w-ov,.adm-ov{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-ov.open,.w-ov.open,.adm-ov.open{display:flex;}
.modal,.w-box,.adm-dash{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:860px;max-height:92vh;overflow-y:auto;position:relative;}

.close-btn{position:absolute;top:10px;right:10px;background:#1a1a1a;border:1px solid var(--border);color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;z-index:10;}

/* GAME OVERLAY */
.game-ov-full{position:fixed;inset:0;z-index:1500;background:#000;display:none;flex-direction:column;}
.game-ov-full.open{display:flex;}
.g-close{position:absolute;top:10px;right:10px;z-index:20;background:rgba(0,0,0,.8);color:#fff;width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;}
.g-iframe{flex:1;}
.g-iframe iframe{width:100%;height:100%;border:none;}

/* RING TIMER */
.t-ring{position:relative;width:36px;height:36px;}
.t-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#1e1e1e;stroke-width:3;}
.ring-fill{fill:none;stroke:#22c55e;stroke-width:3;stroke-dasharray:101;stroke-dashoffset:0;transition:stroke-dashoffset 0.5s;}
.t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;}

/* ADMIN STYLES */
.adm-tabs{display:flex;gap:.5rem;padding:1rem;}
.adm-tab{flex:1;padding:.6rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:#fff;cursor:pointer;}
.adm-tab.active{background:var(--red);border-color:var(--red);}
.adm-body{padding:1rem;}
.adm-game-item{display:flex;justify-content:space-between;background:#1a1a1a;padding:10px;margin-bottom:5px;border-radius:8px;}
.adm-game-del{background:var(--red);color:#fff;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;}
.img-upload-box{border:2px dashed var(--border);padding:1rem;text-align:center;cursor:pointer;margin-bottom:1rem;}
.img-preview{max-width:100%;max-height:150px;display:none;margin:10px auto;border-radius:8px;}

/* TOAST */
.toast,.g-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 20px;border-radius:50px;opacity:0;transition:0.3s;z-index:9999;}
.toast.show,.g-toast.show{opacity:1;bottom:30px;}
</style>
</head>
<body>

<div class="auth-ov" id="authOv">
  <div class="auth-box">
    <div class="auth-logo">WIN<span>TUBE</span></div>
    <div style="text-align:center;margin:1rem 0" id="fLogin">
      <input class="a-inp" type="email" id="lEmail" placeholder="البريد الإلكتروني">
      <input class="a-inp" type="password" id="lPass" placeholder="كلمة المرور">
      <button class="a-sub" onclick="doLogin()">دخول ←</button>
    </div>
    <div class="a-err" id="authErr" style="color:var(--red);text-align:center;font-size:.8rem;margin-top:10px"></div>
  </div>
</div>

<header>
  <div class="logo">WIN<span>TUBE</span></div>
  <div class="search-bar">
    <button>🔍</button>
    <input type="text" id="searchInput" placeholder="ابحث عن فيديوهات...">
  </div>
  <div class="user-panel" onclick="doSignOut()">
    <div><div class="user-name" id="hName">—</div><div class="user-pts">⭐ <span id="hPts">0</span> نقطة</div></div>
    <div class="user-avatar" id="hAvatar">?</div>
  </div>
  <button class="hbtn hbtn-gold" id="btnW" onclick="openWithdraw()" style="display:none">💰 سحب</button>
  <button class="hbtn hbtn-red"  id="btnA" onclick="openAdmin()"    style="display:none">🛡️ أدمن</button>
</header>

<main>
  <div id="secHome">
    <div class="section-title">🔥 الفيديوهات الرائجة</div>
    <div class="video-grid" id="gridHome"></div>
    
    <div style="margin-top:3rem">
      <div class="section-title">🎮 الألعاب المميزة</div>
      <div class="games-grid" id="gGrid"></div>
      <div id="gEmpty" style="display:none;text-align:center;color:var(--muted)">لا توجد ألعاب حالياً</div>
    </div>
  </div>
</main>

<div class="modal-ov" id="modalOv">
  <div class="modal">
    <button class="close-btn" onclick="closeVideoModal()">✕</button>
    <div style="padding:1rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border)">
      <div class="t-ring">
        <svg width="36" height="36" viewBox="0 0 38 38"><circle class="ring-bg" cx="19" cy="19" r="16"/><circle class="ring-fill" id="ringFill" cx="19" cy="19" r="16"/></svg>
        <div class="t-num" id="tNum">30</div>
      </div>
      <div id="modalTitle" style="font-weight:700;font-size:.9rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis"></div>
    </div>
    <div id="ytPCWrap" style="aspect-ratio:16/9;background:#000"></div>
  </div>
</div>

<div class="game-ov-full" id="gameOv">
  <button class="g-close" onclick="closeGameOverlay()">✕</button>
  <div style="position:absolute;top:10px;left:10px;z-index:20;background:rgba(0,0,0,0.7);padding:5px 15px;border-radius:50px;color:var(--yellow);font-weight:700">
    🎮 <span id="gPtsStatus">0 / 50</span> نقطة
  </div>
  <div class="g-iframe"><iframe id="gFrame"></iframe></div>
</div>

<div class="adm-ov" id="admOv">
  <div class="adm-dash" style="max-width:500px">
    <button class="close-btn" onclick="closeAdmin()">✕</button>
    <div id="admLogin" style="padding:2rem;text-align:center">
      <h3 style="margin-bottom:1rem">لوحة الإدارة</h3>
      <input class="a-inp" type="password" id="admPass" placeholder="كلمة مرور الإدارة">
      <button class="a-sub" onclick="checkAdminPass()">دخول</button>
    </div>
    <div id="admContent" style="display:none">
      <div class="adm-tabs">
        <button class="adm-tab active" id="tabW" onclick="switchAdminTab('w')">السحب</button>
        <button class="adm-tab" id="tabG" onclick="switchAdminTab('g')">الألعاب</button>
      </div>
      <div class="adm-body" id="aPanelW">
        <h4>طلبات السحب</h4>
        <div id="admReqs"></div>
      </div>
      <div class="adm-body" id="aPanelG" style="display:none">
        <h4>إضافة لعبة جديدة</h4>
        <input class="a-inp" type="text" id="newGameName" placeholder="اسم اللعبة">
        <div class="img-upload-box" onclick="G('newGameImg').click()">
          <input type="file" id="newGameImg" accept="image/*" style="display:none" onchange="previewGameImg(this)">
          <img id="imgPreview" class="img-preview">
          <div id="imgPlaceholder">🖼️ اضغط لرفع صورة</div>
        </div>
        <input class="a-inp" type="text" id="newGameUrl" placeholder="رابط اللعبة (URL أو Iframe)">
        <button class="a-sub" onclick="adminAddGame()" id="addBtn">إضافة اللعبة</button>
        <hr style="margin:1rem 0;border:none;border-top:1px solid var(--border)">
        <h4>الألعاب الحالية</h4>
        <div id="admGames"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="g-toast" id="gToast">+1 نقطة 🎮</div>

<script>
// ═══════════════════════════════════════
// CONFIG & STATE 
// ═══════════════════════════════════════
var YT_KEY='AIzaSyDNK9EJ5IQ2dFLBn1jUk1hslgOwwTBdvJ0';
var FB_CFG={apiKey:'AIzaSyCOV-2qbB6eFEU-myiTjlXbcE-bWhuqLQs',authDomain:'wintube-8bcaa.firebaseapp.com',projectId:'wintube-8bcaa',storageBucket:'wintube-8bcaa.firebasestorage.app',messagingSenderId:'459173658209',appId:'1:459173658209:web:d1e5ddf04ecf548cc67420'};
var ADMIN_PASS='Hernios66@';

var START_PTS=100, EARN_AMT=1, EARN_EVERY=30, GAME_CAP=50;

var _auth=null, _db=null, currentUser=null, userPoints=0, playing=false, tSecs=EARN_EVERY, wInt=null, ytPlayerObj=null;
var gInt=null, gElapsed=0, activeGid=null;

function G(id){return document.getElementById(id);}
function drawRing(){var off=101-(101*( (EARN_EVERY-tSecs)/EARN_EVERY )); G('ringFill').style.strokeDashoffset=off; G('tNum').textContent=tSecs;}
function todayK(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function loadSc(src){return new Promise((ok,err)=>{var s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=err;document.head.appendChild(s);});}

// ═══════════════════════════════════════
// AUTH & FIREBASE
// ═══════════════════════════════════════
loadSc('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js')
.then(()=>loadSc('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js'))
.then(()=>loadSc('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js'))
.then(()=>{
  firebase.initializeApp(FB_CFG);
  _auth=firebase.auth(); _db=firebase.firestore();
  _auth.onAuthStateChanged(user=>{
    if(user){
      currentUser=user;
      _db.collection('users').doc(user.uid).get().then(snap=>{
        if(snap.exists) userPoints=snap.data().points||0;
        else { userPoints=START_PTS; _db.collection('users').doc(user.uid).set({points:START_PTS,email:user.email}); }
        updateHeader(); G('authOv').classList.add('hidden');
        G('btnW').style.display=''; G('btnA').style.display='';
        loadGamesGrid();
      });
    } else {
      currentUser=null; G('authOv').classList.remove('hidden');
      G('btnW').style.display='none'; G('btnA').style.display='none';
    }
  });
});

function doLogin(){
  var em=G('lEmail').value, pw=G('lPass').value;
  if(!em||!pw)return;
  _auth.signInWithEmailAndPassword(em,pw).catch(e=>{G('authErr').textContent="خطأ في البيانات";});
}
function doSignOut(){ if(confirm('خروج؟')) _auth.signOut(); }
function savePoints(){if(!_db||!currentUser)return;_db.collection('users').doc(currentUser.uid).update({points:userPoints});}
function updateHeader(){
  if(!currentUser)return;
  G('hPts').textContent=userPoints;
  G('hName').textContent=currentUser.displayName||currentUser.email.split('@')[0];
  G('hAvatar').textContent=(currentUser.displayName||'U')[0].toUpperCase();
}

// ═══════════════════════════════════════
// VIDEO MODAL
// ═══════════════════════════════════════
function openVideoModal(vid,title){
  if(!currentUser)return;
  G('modalTitle').textContent=title;
  G('modalOv').classList.add('open');
  G('ytPCWrap').innerHTML = '<div id="ytDiv"></div>';
  ytPlayerObj = new YT.Player('ytDiv', {
    height: '100%', width: '100%', videoId: vid,
    playerVars: { 'autoplay': 1, 'playsinline': 1 },
    events: {
      'onStateChange': (e)=>{ playing = (e.data == YT.PlayerState.PLAYING); }
    }
  });
  startWTimer();
}
function closeVideoModal(){
  G('modalOv').classList.remove('open');
  stopWTimer();
  if(ytPlayerObj) ytPlayerObj.destroy();
}
function startWTimer(){
  tSecs=EARN_EVERY; drawRing();
  wInt=setInterval(()=>{
    if(!playing)return;
    tSecs--; drawRing();
    if(tSecs<=0){
      tSecs=EARN_EVERY; userPoints+=EARN_AMT; savePoints(); updateHeader();
      showToast('+1 نقطة 🎉');
    }
  },1000);
}
function stopWTimer(){ clearInterval(wInt); playing=false; }

// ═══════════════════════════════════════
// GAMES LOGIC (30s = 1pt)
// ═══════════════════════════════════════
function loadGamesGrid(){
  _db.collection('games').orderBy('date','desc').get().then(snap=>{
    var grid=G('gGrid'); grid.innerHTML='';
    if(snap.empty){ G('gEmpty').style.display='block'; return; }
    G('gEmpty').style.display='none';
    snap.forEach(doc=>{
      var d=doc.data(), id=doc.id;
      var bg = d.img ? `url(${d.img})` : 'linear-gradient(135deg,#1a0533,#2d0a5c)';
      var card=document.createElement('div'); card.className='game-card';
      card.innerHTML=`<div class="game-thumb" style="background:${bg} center/cover"><div class="game-ov"><div class="game-play">▶</div></div></div><div class="game-info"><div class="game-name">${d.name}</div></div>`;
      card.onclick=()=>openGameOverlay(id,d.name,d.url);
      grid.appendChild(card);
    });
  });
}

function openGameOverlay(id,name,url){
  activeGid=id; G('gFrame').src=url; G('gameOv').classList.add('open');
  var key = currentUser.uid+'_'+id+'_'+todayK();
  _db.collection('game_points').doc(key).get().then(snap=>{
    var pts = snap.exists ? snap.data().pts : 0;
    G('gPtsStatus').textContent = pts + ' / ' + GAME_CAP;
    startGameTimer(key, pts);
  });
}
function closeGameOverlay(){ G('gameOv').classList.remove('open'); G('gFrame').src=''; stopGameTimer(); }

function startGameTimer(key, currentPts){
  gElapsed=0;
  gInt = setInterval(()=>{
    gElapsed++;
    if(gElapsed >= 30){ // كل 30 ثانية نقطة
      gElapsed=0;
      if(currentPts < GAME_CAP){
        currentPts++; userPoints++;
        savePoints(); updateHeader();
        _db.collection('game_points').doc(key).set({pts:currentPts},{merge:true});
        G('gPtsStatus').textContent = currentPts + ' / ' + GAME_CAP;
        G('gToast').classList.add('show'); setTimeout(()=>G('gToast').classList.remove('show'),2000);
      }
    }
  },1000);
}
function stopGameTimer(){ clearInterval(gInt); }

// ═══════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════
function openAdmin(){ G('admOv').classList.add('open'); G('admLogin').style.display='block'; G('admContent').style.display='none'; }
function closeAdmin(){ G('admOv').classList.remove('open'); }
function checkAdminPass(){
  if(G('admPass').value===ADMIN_PASS){ G('admLogin').style.display='none'; G('admContent').style.display='block'; switchAdminTab('w'); }
  else alert('كلمة مرور خاطئة');
}
function switchAdminTab(t){
  G('tabW').classList.toggle('active',t==='w'); G('tabG').classList.toggle('active',t==='g');
  G('aPanelW').style.display=t==='w'?'block':'none'; G('aPanelG').style.display=t==='g'?'block':'none';
  if(t==='g') loadAdminGames();
}
function previewGameImg(input){
  if(input.files && input.files[0]){
    var reader = new FileReader();
    reader.onload = (e)=>{ G('imgPreview').src=e.target.result; G('imgPreview').style.display='block'; G('imgPlaceholder').style.display='none'; };
    reader.readAsDataURL(input.files[0]);
  }
}
function adminAddGame(){
  var n=G('newGameName').value, u=G('newGameUrl').value, im=G('imgPreview').src;
  if(!n||!u)return;
  G('addBtn').disabled=true;
  _db.collection('games').add({ name:n, url:u, img:im.startsWith('data')?im:null, date:firebase.firestore.FieldValue.serverTimestamp() })
  .then(()=>{ alert('تمت الإضافة'); loadAdminGames(); loadGamesGrid(); G('addBtn').disabled=false; });
}
function loadAdminGames(){
  _db.collection('games').orderBy('date','desc').get().then(snap=>{
    var c=G('admGames'); c.innerHTML='';
    snap.forEach(doc=>{
      c.innerHTML+=`<div class="adm-game-item"><span>${doc.data().name}</span><button class="adm-game-del" onclick="delGame('${doc.id}')">حذف</button></div>`;
    });
  });
}
function delGame(id){ if(confirm('حذف؟')) _db.collection('games').doc(id).delete().then(()=>loadAdminGames()); }

// ═══════════════════════════════════════
// YOUTUBE API
// ═══════════════════════════════════════
var BASE='https://www.googleapis.com/youtube/v3/';
function fetchHome(){
  fetch(BASE+'videos?part=snippet&chart=mostPopular&regionCode=SA&maxResults=12&key='+YT_KEY)
  .then(r=>r.json()).then(d=>{
    var grid=G('gridHome'); grid.innerHTML='';
    d.items.forEach(item=>{
      var s=item.snippet, vid=item.id;
      var card=document.createElement('div'); card.className='video-card';
      card.innerHTML=`<div class="thumb-wrap"><img src="${s.thumbnails.high.url}"><div class="play-ov"><div class="play-btn">▶</div></div></div><div class="card-info"><div class="card-title">${s.title}</div></div>`;
      card.onclick=()=>openVideoModal(vid,s.title);
      grid.appendChild(card);
    });
  });
}
window.onYouTubeIframeAPIReady = fetchHome;
loadSc('https://www.youtube.com/iframe_api');

function showToast(m){ var t=G('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
</script>
