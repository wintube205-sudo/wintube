<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة سيارات كلاسيكية</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* لمنع التمرير باللمس */
        }

        #gameArea {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px; /* أقصى عرض */
            max-height: 850px; /* أقصى طول لمنع مشكلة التمطي في وضع الكمبيوتر */
            background-color: #34495e;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* للشاشات العريضة جداً، نجعل الزوايا دائرية قليلاً */
        @media (min-width: 500px) and (min-height: 850px) {
            #gameArea {
                border-radius: 15px;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #scoreBoard {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid #3498db;
            z-index: 10;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #e74c3c;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
            font-size: 32px;
        }
        
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 10px;
            color: #ecf0f1;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.6);
        }

        #gameOverScreen {
            display: none;
        }
    </style>
</head>
<body>

    <div id="gameArea">
        <div id="scoreBoard">النتيجة: <span id="score">0</span></div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="startScreen" class="screen">
            <h1>سباق السيارات</h1>
            <p>📱 <b>للهاتف:</b> المس يمين أو يسار الشاشة</p>
            <p>💻 <b>للحاسوب:</b> استخدم الأسهم يمين/يسار</p>
            <button onclick="startGame()">ابدأ اللعب</button>
        </div>

        <div id="gameOverScreen" class="screen">
            <h1>انتهى السباق!</h1>
            <p>النقاط التي جمعتها: <br><span id="finalScore" style="color: #f1c40f; font-weight: bold; font-size: 36px; display: block; margin-top: 10px;">0</span></p>
            <button onclick="startGame()">العب مرة أخرى</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameArea = document.getElementById('gameArea');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        let animationId;
        let score = 0;
        let speed = 5;
        let keys = { ArrowLeft: false, ArrowRight: false };
        let isGameRunning = false;

        // إعدادات سيارة اللاعب
        const player = {
            width: 50,
            height: 80,
            color: '#e74c3c',
            speed: 7,
            x: 0,
            y: 0
        };

        let enemies = [];
        let lines = [];

        // تحديث أبعاد الكانفاس لتطابق المساحة الفعلية
        function resizeCanvas() {
            const rect = gameArea.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            // تأمين موقع السيارة عند تغيير الحجم
            player.y = canvas.height - 120;
            
            if (!isGameRunning || player.x > canvas.width - player.width - 20) {
                player.x = canvas.width / 2 - player.width / 2;
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- التحكم ---
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'ArrowRight') keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'ArrowRight') keys[e.key] = false;
        });

        gameArea.addEventListener('touchstart', handleTouch, {passive: false});
        gameArea.addEventListener('touchmove', handleTouch, {passive: false});
        gameArea.addEventListener('touchend', stopTouch);

        function handleTouch(e) {
            if (!isGameRunning) return;
            e.preventDefault(); 
            const touch = e.touches[0];
            const rect = gameArea.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            
            if (touchX < rect.width / 2) {
                keys.ArrowLeft = true;
                keys.ArrowRight = false;
            } else {
                keys.ArrowRight = true;
                keys.ArrowLeft = false;
            }
        }

        function stopTouch() {
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
        }

        function initLines() {
            lines = [];
            let lineCount = Math.ceil(canvas.height / 120) + 1;
            for (let i = 0; i < lineCount; i++) {
                lines.push({ y: i * 120 });
            }
        }

        function spawnEnemy() {
            let roadWidth = canvas.width - 40;
            let enemyX = 25 + Math.random() * (roadWidth - player.width - 10);
            
            enemies.push({
                x: enemyX,
                y: -100,
                width: 50,
                height: 80,
                color: ['#3498db', '#f1c40f', '#9b59b6', '#2ecc71', '#1abc9c'][Math.floor(Math.random() * 5)]
            });
        }

        function drawCar(car) {
            ctx.fillStyle = car.color;
            ctx.beginPath();
            ctx.roundRect(car.x, car.y, car.width, car.height, 10);
            ctx.fill();
            
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(car.x + 10, car.y + 15, car.width - 20, 20);
            ctx.fillRect(car.x + 10, car.y + 50, car.width - 20, 15);
            
            ctx.fillStyle = car.color === '#e74c3c' ? '#f1c40f' : '#fff';
            ctx.beginPath();
            ctx.arc(car.x + 12, car.y + 5, 4, 0, Math.PI * 2);
            ctx.arc(car.x + car.width - 12, car.y + 5, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.roundRect(car.x - 4, car.y + 15, 6, 20, 3);
            ctx.roundRect(car.x + car.width - 2, car.y + 15, 6, 20, 3);
            ctx.roundRect(car.x - 4, car.y + 50, 6, 20, 3);
            ctx.roundRect(car.x + car.width - 2, car.y + 50, 6, 20, 3);
            ctx.fill();
        }

        function update() {
            // تثبيت اللاعب في أسفل الشاشة برمجياً بشكل دائم لمنع اختفائه
            player.y = canvas.height - 120;

            if (keys.ArrowLeft && player.x > 20) player.x -= player.speed;
            if (keys.ArrowRight && player.x < canvas.width - player.width - 20) player.x += player.speed;

            for (let i = 0; i < lines.length; i++) {
                lines[i].y += speed;
                if (lines[i].y > canvas.height) {
                    lines[i].y -= canvas.height + 120;
                }
            }

            for (let i = 0; i < enemies.length; i++) {
                let enemy = enemies[i];
                enemy.y += speed * 0.8;

                let margin = 5; 
                if (player.x + margin < enemy.x + enemy.width - margin &&
                    player.x + player.width - margin > enemy.x + margin &&
                    player.y + margin < enemy.y + enemy.height - margin &&
                    player.y + player.height - margin > enemy.y + margin) {
                    gameOver();
                }

                if (enemy.y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = score;
                    if (score % 50 === 0 && speed < 18) speed += 0.8;
                    i--;
                }
            }

            let spawnRate = 0.02 + (speed * 0.001);
            if (Math.random() < spawnRate && enemies.length < Math.floor(canvas.height / 200)) {
                let canSpawn = true;
                if(enemies.length > 0) {
                    let lastEnemy = enemies[enemies.length - 1];
                    if(lastEnemy.y < 180) canSpawn = false; 
                }
                if(canSpawn) spawnEnemy();
            }
        }

        function draw() {
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, 20, canvas.height);
            ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);

            ctx.fillStyle = 'rgba(236, 240, 241, 0.7)';
            for (let i = 0; i < lines.length; i++) {
                ctx.fillRect(canvas.width / 2 - 5, lines[i].y, 10, 60);
                ctx.fillRect(35, lines[i].y, 5, 40);
                ctx.fillRect(canvas.width - 40, lines[i].y, 5, 40);
            }

            for (let i = 0; i < enemies.length; i++) drawCar(enemies[i]);
            drawCar(player); // رسم سيارة اللاعب
        }

        function gameLoop() {
            if (!isGameRunning) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            resizeCanvas(); 
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            score = 0;
            speed = 6;
            scoreElement.innerText = score;
            enemies = [];
            keys = { ArrowLeft: false, ArrowRight: false };
            initLines();
            isGameRunning = true;
            spawnEnemy();
            cancelAnimationFrame(animationId);
            gameLoop();
        }

        function gameOver() {
            isGameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
