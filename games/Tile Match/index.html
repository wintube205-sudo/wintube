<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة مطابقة البلاطات</title>
    <style>
        :root {
            --bg-image: url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=2070&auto=format&fit=crop');
            --tile-bg: #ffffff;
            --slot-bg: rgba(0, 0, 0, 0.85); /* الخانات السوداء */
        }

        body {
            margin: 0; padding: 0; background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: manipulation;
            user-select: none; /* منع تحديد النص بالغلط */
        }

        #game-container {
            width: 100%; max-width: 500px; height: 100%;
            display: flex; flex-direction: column; position: relative;
            background-image: var(--bg-image); background-size: cover; background-position: center;
        }

        header {
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); z-index: 50;
            color: white; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .level-badge {
            background: linear-gradient(135deg, #ff7675, #d63031);
            padding: 6px 18px; border-radius: 20px; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(214, 48, 49, 0.4);
        }

        .score-badge { font-weight: bold; font-size: 18px; }

        #board { flex-grow: 1; position: relative; padding: 20px; z-index: 10; }

        .tile {
            position: absolute; width: 60px; height: 70px; background: var(--tile-bg);
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            font-size: 35px; box-shadow: 0 6px 0 #bdc3c7, 0 10px 15px rgba(0,0,0,0.3);
            cursor: pointer; z-index: 5; border: 2px solid #fff;
            transition: transform 0.1s;
        }

        .tile:active { transform: translateY(4px); box-shadow: 0 2px 0 #bdc3c7; }

        .tile.blocked { filter: brightness(0.5) grayscale(0.6); pointer-events: none; }

        footer {
            height: 130px; background: rgba(0, 0, 0, 0.7);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; backdrop-filter: blur(15px);
        }

        #slots-container {
            display: flex; gap: 6px; background: var(--slot-bg); padding: 10px;
            border-radius: 15px; width: 92%; height: 75px; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2); box-sizing: border-box;
        }

        .slot {
            width: calc(100% / 7); max-width: 50px; height: 100%; background: rgba(255, 255, 255, 0.05);
            border-radius: 8px; display: flex; justify-content: center; align-items: center;
            font-size: 30px; border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .slot:not(:empty) { background: white; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.4); color: black;}

        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
        }

        button {
            padding: 15px 40px; font-size: 20px; background: linear-gradient(135deg, #ff7675, #d63031);
            color: white; border: none; border-radius: 30px; cursor: pointer; margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <div class="level-badge">المستوى <span id="level-num">1</span></div>
            <div class="score-badge">النقاط: <span id="score">0</span></div>
        </header>

        <div id="board"></div>

        <footer>
            <div id="slots-container">
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                <div class="slot"></div><div class="slot"></div><div class="slot"></div>
                <div class="slot"></div>
            </div>
        </footer>

        <div id="msg-modal" class="modal">
            <h1 id="modal-title">أحسنت!</h1>
            <p id="modal-desc">استعد للمرح القادم</p>
            <button id="modal-btn" onclick="handleModalAction()">استمرار</button>
        </div>
    </div>

    <script>
        const emojis = ['🍓', '🍒', '🍕', '🍩', '🍦', '🍔', '🍇', '🍉', '🍋', '🥑', '🍍', '🍑', '🍣', '🍫', '🍭', '💎', '🌸', '🔥'];
        let currentLevel = 1;
        let score = 0;
        let slots = [];

        // دالة لتحميل التقدم من ذاكرة الهاتف
        function loadProgress() {
            const savedLevel = localStorage.getItem('tileMatchLevel');
            const savedScore = localStorage.getItem('tileMatchScore');
            
            if (savedLevel) currentLevel = parseInt(savedLevel);
            if (savedScore) score = parseInt(savedScore);
            
            document.getElementById('level-num').innerText = currentLevel;
            document.getElementById('score').innerText = score;
        }

        // دالة لحفظ التقدم في ذاكرة الهاتف
        function saveProgress() {
            localStorage.setItem('tileMatchLevel', currentLevel);
            localStorage.setItem('tileMatchScore', score);
        }

        function initLevel(level) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            slots = [];
            updateSlotsUI();
            document.getElementById('msg-modal').style.display = 'none';

            // زيادة عدد البلاطات كلما تقدم في المستوى
            const numGroups = 4 + Math.floor(level * 1.5); 
            const iconsInPlay = Math.min(emojis.length, 4 + level);
            let pool = [];
            for (let i = 0; i < numGroups; i++) {
                const e = emojis[i % iconsInPlay];
                pool.push(e, e, e); // ثلاث حبات من كل شكل
            }
            pool.sort(() => Math.random() - 0.5); // خلط البلاطات

            const boardRect = board.getBoundingClientRect();
            
            pool.forEach((emoji, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = emoji;
                
                // توزيع عشوائي داخل إطار اللعب
                const maxX = boardRect.width - 70;
                const maxY = boardRect.height - 80;
                
                tile.style.left = (10 + Math.random() * maxX) + 'px';
                tile.style.top = (10 + Math.random() * maxY) + 'px';
                tile.style.zIndex = idx;
                tile.dataset.emoji = emoji;
                tile.onclick = () => selectTile(tile);
                board.appendChild(tile);
            });
            checkBlockers();
        }

        function checkBlockers() {
            const tiles = Array.from(document.querySelectorAll('.tile:not(.selected)'));
            tiles.forEach((t1, i) => {
                let isBlocked = false;
                const r1 = t1.getBoundingClientRect();
                for (let j = i + 1; j < tiles.length; j++) {
                    const r2 = tiles[j].getBoundingClientRect();
                    // فحص إذا كانت البلاطة مغطاة ببلاطة أخرى فوقها
                    if (!(r1.right < r2.left + 15 || r1.left > r2.right - 15 || r1.bottom < r2.top + 15 || r1.top > r2.bottom - 15)) {
                        isBlocked = true; break;
                    }
                }
                t1.classList.toggle('blocked', isBlocked);
            });
        }

        function selectTile(tile) {
            if (tile.classList.contains('blocked') || slots.length >= 7) return;
            tile.classList.add('selected');
            tile.style.display = 'none';
            slots.push(tile.dataset.emoji);
            slots.sort(); // ترتيب لتسهيل المطابقة
            updateSlotsUI();
            checkMatches();
            setTimeout(checkBlockers, 50);
        }

        function updateSlotsUI() {
            const slotEls = document.querySelectorAll('.slot');
            slotEls.forEach((s, i) => s.innerText = slots[i] || '');
        }

        function checkMatches() {
            const counts = {};
            slots.forEach(e => counts[e] = (counts[e] || 0) + 1);
            for (let e in counts) {
                if (counts[e] === 3) { // إذا جمع 3 متشابهة
                    setTimeout(() => {
                        slots = slots.filter(item => item !== e);
                        score += 50;
                        document.getElementById('score').innerText = score;
                        saveProgress(); // حفظ النقاط فوراً
                        updateSlotsUI();
                        
                        // فحص الفوز
                        if (document.querySelectorAll('.tile:not(.selected)').length === 0 && slots.length === 0) {
                            showModal('رائع جداً!', 'لقد أنهيت المستوى بنجاح', 'المستوى التالي', 'win');
                        }
                    }, 300);
                    return;
                }
            }
            // فحص الخسارة (امتلاء الخانات)
            if (slots.length >= 7) {
                showModal('خسارة!', 'امتلات الخانات، حاول مرة أخرى', 'إعادة المستوى', 'lose');
            }
        }

        let currentModalState = 'win';
        function showModal(title, desc, btnText, state) {
            currentModalState = state;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-title').style.color = state === 'win' ? '#55efc4' : '#ff7675';
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-btn').innerText = btnText;
            document.getElementById('msg-modal').style.display = 'flex';
        }

        function handleModalAction() {
            if (currentModalState === 'win') {
                currentLevel++;
                saveProgress(); // حفظ المستوى الجديد
            } else {
                // إذا خسر، يتم تفريغ الخانات وإعادة نفس المستوى
                slots = [];
            }
            document.getElementById('level-num').innerText = currentLevel;
            initLevel(currentLevel);
        }

        // تشغيل اللعبة عند فتح الصفحة
        window.onload = () => {
            loadProgress();
            initLevel(currentLevel);
        };
    </script>
</body>
</html>
