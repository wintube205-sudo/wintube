<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- إعدادات الشاشة لتناسب الهواتف المحمولة بشكل مثالي -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الطائر المرفرف - حصري</title>
    <style>
        /* التنسيقات الأساسية وإزالة الحواف */
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* منع التكبير والسحب في الموبايل */
        }

        /* حاوية اللعبة */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px; /* عرض اللعبة على الكمبيوتر */
            height: 100vh;
            max-height: 600px; /* طول اللعبة */
            background-color: #70c5ce; /* لون السماء */
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
        }

        /* لوحة الرسم التي تعمل عليها اللعبة */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* واجهة المستخدم (الأزرار والنتيجة) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* للسماح بالضغط على اللوحة خلفها */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* إخفاء العناصر */
        .hidden {
            display: none !important;
        }

        /* تصميم الأزرار */
        .btn {
            pointer-events: auto;
            background-color: #eab308;
            border: 3px solid #fff;
            padding: 12px 35px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 4px 0 #b48600;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* لوحة النتيجة عند الخسارة */
        .score-board {
            pointer-events: auto;
            background-color: #ded895;
            border: 4px solid #543847;
            padding: 25px 50px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
        }

        .score-text {
            font-size: 35px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }

        /* النتيجة المباشرة أثناء اللعب */
        #live-score {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            z-index: 10;
        }

        .title {
            font-size: 45px;
            color: white;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- النتيجة الحية -->
        <div id="live-score" class="hidden">0</div>
        
        <!-- مساحة رسم اللعبة -->
        <canvas id="gameCanvas"></canvas>

        <!-- واجهة القوائم -->
        <div id="ui-layer">
            <!-- شاشة البداية -->
            <div id="start-screen">
                <div class="title">الطائر المرفرف</div>
                <button class="btn" id="start-btn">العب الآن</button>
            </div>

            <!-- شاشة الخسارة -->
            <div id="game-over-screen" class="hidden">
                <div class="score-board">
                    <h2 style="margin: 0 0 10px 0; color: #543847; font-size: 20px;">النتيجة</h2>
                    <div class="score-text" id="final-score" style="color: #f97316;">0</div>
                    
                    <h2 style="margin: 15px 0 10px 0; color: #543847; font-size: 20px;">أفضل نتيجة</h2>
                    <div class="score-text" id="best-score" style="color: #eab308;">0</div>
                </div>
                <button class="btn" id="restart-btn">إعادة المحاولة</button>
            </div>
        </div>
    </div>

    <script>
        // --- الإعدادات الأساسية للعبة ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // تحديد أبعاد اللعبة البرمجية (سيقوم الـ CSS بتكبيرها لتناسب الشاشة)
        canvas.width = 400;
        canvas.height = 600;

        // عناصر الواجهة
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const liveScoreEl = document.getElementById('live-score');
        const finalScoreEl = document.getElementById('final-score');
        const bestScoreEl = document.getElementById('best-score');

        // متغيرات اللعبة
        let frames = 0;
        let score = 0;
        let bestScore = localStorage.getItem('flappy_best_score') || 0;
        
        // حالات اللعبة
        const state = {
            current: 0,
            getReady: 0,
            game: 1,
            over: 2
        };

        // إعدادات الأرضية
        const ground = {
            h: 100, // ارتفاع الأرضية
            draw: function() {
                // رسم الجزء البني
                ctx.fillStyle = '#ded895';
                ctx.fillRect(0, canvas.height - this.h, canvas.width, this.h);
                // رسم العشب الأخضر
                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(0, canvas.height - this.h, canvas.width, 15);
                ctx.strokeStyle = '#543847';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height - this.h);
                ctx.lineTo(canvas.width, canvas.height - this.h);
                ctx.stroke();
            }
        };

        // إعدادات الطائر
        const bird = {
            x: 100,
            y: 250,
            radius: 15,
            velocity: 0,
            gravity: 0.35,
            jump: -7.5,
            rotation: 0,

            draw: function() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // تدوير الطائر حسب السرعة (ينزل رأسه للأسفل عند السقوط)
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                ctx.rotate(this.rotation);

                // رسم جسم الطائر (أصفر)
                ctx.fillStyle = '#fde047';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // رسم العين (بيضاء)
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(6, -5, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // بؤبؤ العين (أسود)
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(8, -5, 2, 0, Math.PI * 2);
                ctx.fill();

                // المنقار (برتقالي)
                ctx.fillStyle = '#f97316';
                ctx.beginPath();
                ctx.moveTo(8, 2);
                ctx.lineTo(22, 5);
                ctx.lineTo(8, 10);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            },

            update: function() {
                // حركة خفيفة قبل بدء اللعبة
                if (state.current === state.getReady) {
                    this.y = 250 + Math.cos(frames / 15) * 10;
                } else {
                    // تطبيق الجاذبية
                    this.velocity += this.gravity;
                    this.y += this.velocity;

                    // الاصطدام بالأرض
                    if (this.y + this.radius >= canvas.height - ground.h) {
                        this.y = canvas.height - ground.h - this.radius;
                        if (state.current === state.game) {
                            state.current = state.over;
                            showGameOver();
                        }
                    }
                    
                    // منع الطائر من الخروج من أعلى الشاشة
                    if (this.y - this.radius <= 0) {
                        this.y = this.radius;
                        this.velocity = 0;
                    }
                }
            },
            
            flap: function() {
                this.velocity = this.jump;
            }
        };

        // إعدادات الأنابيب
        const pipes = {
            position: [],
            width: 65,
            gap: 140, // المسافة بين الأنبوب العلوي والسفلي (اجعلها أكبر لتسهيل اللعبة)
            dx: 3, // سرعة حركة الأنابيب

            draw: function() {
                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    let topY = p.y;
                    let bottomY = p.y + this.gap;

                    ctx.fillStyle = '#73bf2e'; // لون أخضر
                    ctx.strokeStyle = '#543847'; // حدود بنية غامقة
                    ctx.lineWidth = 3;

                    // الأنبوب العلوي
                    ctx.fillRect(p.x, 0, this.width, topY);
                    ctx.strokeRect(p.x, 0, this.width, topY);
                    // رأس الأنبوب العلوي
                    ctx.fillRect(p.x - 4, topY - 25, this.width + 8, 25);
                    ctx.strokeRect(p.x - 4, topY - 25, this.width + 8, 25);

                    // الأنبوب السفلي
                    ctx.fillRect(p.x, bottomY, this.width, canvas.height - bottomY - ground.h);
                    ctx.strokeRect(p.x, bottomY, this.width, canvas.height - bottomY - ground.h);
                    // رأس الأنبوب السفلي
                    ctx.fillRect(p.x - 4, bottomY, this.width + 8, 25);
                    ctx.strokeRect(p.x - 4, bottomY, this.width + 8, 25);
                }
            },

            update: function() {
                if (state.current !== state.game) return;

                // إضافة أنبوب جديد كل 100 إطار
                if (frames % 100 === 0) {
                    this.position.push({
                        x: canvas.width,
                        y: Math.random() * (canvas.height - ground.h - this.gap - 100) + 50,
                        passed: false // لمعرفة إذا تجاوزها الطائر ليحسب النقطة
                    });
                }

                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    let bottomPipeYPos = p.y + this.gap;

                    // تحريك الأنبوب لليسار
                    p.x -= this.dx;

                    // --- اكتشاف الاصطدام ---
                    let birdLeft = bird.x - bird.radius + 5; // +5 لتقليل مساحة الاصطدام قليلاً
                    let birdRight = bird.x + bird.radius - 5;
                    let birdTop = bird.y - bird.radius + 5;
                    let birdBottom = bird.y + bird.radius - 5;

                    // هل الطائر داخل منطقة الأنبوب أفقياً؟
                    if (birdRight > p.x && birdLeft < p.x + this.width) {
                        // هل الطائر يلمس الأنبوب العلوي أو السفلي؟
                        if (birdTop < p.y || birdBottom > bottomPipeYPos) {
                            state.current = state.over;
                            showGameOver();
                        }
                    }

                    // حساب النقاط
                    if (p.x + this.width < bird.x && !p.passed) {
                        score++;
                        liveScoreEl.innerText = score;
                        p.passed = true;
                    }

                    // حذف الأنبوب إذا خرج من الشاشة
                    if (p.x + this.width < 0) {
                        this.position.shift();
                        i--; // تعديل العداد لأن المصفوفة قصرت
                    }
                }
            },
            
            reset: function() {
                this.position = [];
            }
        };

        // رسم السحب في الخلفية كزينة
        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(100 - (frames * 0.5 % 500), 150, 30, 0, Math.PI * 2);
            ctx.arc(140 - (frames * 0.5 % 500), 150, 40, 0, Math.PI * 2);
            ctx.arc(180 - (frames * 0.5 % 500), 150, 30, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(350 - (frames * 0.3 % 500), 250, 20, 0, Math.PI * 2);
            ctx.arc(380 - (frames * 0.3 % 500), 250, 30, 0, Math.PI * 2);
            ctx.arc(410 - (frames * 0.3 % 500), 250, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        // دالة الرسم الأساسية
        function draw() {
            // تنظيف الشاشة (رسم لون السماء)
            ctx.fillStyle = '#70c5ce';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawClouds();
            pipes.draw();
            ground.draw();
            bird.draw();
        }

        // دالة التحديث الأساسية
        function update() {
            bird.update();
            pipes.update();
        }

        // حلقة اللعبة (Game Loop)
        function loop() {
            update();
            draw();
            frames++;
            requestAnimationFrame(loop);
        }

        // --- التحكم وأحداث الأزرار ---

        function onInput(e) {
            // إذا كان الحدث من الموبايل أو زر الماوس
            if (e.type === 'touchstart') e.preventDefault(); // لمنع التأثيرات الافتراضية للموبايل

            switch (state.current) {
                case state.getReady:
                    state.current = state.game;
                    startScreen.classList.add('hidden');
                    liveScoreEl.classList.remove('hidden');
                    liveScoreEl.innerText = score;
                    bird.flap();
                    break;
                case state.game:
                    bird.flap();
                    break;
            }
        }

        // استدعاء أحداث اللمس والضغط
        canvas.addEventListener('mousedown', onInput);
        canvas.addEventListener('touchstart', onInput, {passive: false});

        // زر المسافة (Space) للكمبيوتر
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                onInput(e);
            }
        });

        // زر البداية
        document.getElementById('start-btn').addEventListener('click', function() {
            state.current = state.game;
            startScreen.classList.add('hidden');
            liveScoreEl.classList.remove('hidden');
            bird.flap();
        });

        // زر إعادة اللعب
        document.getElementById('restart-btn').addEventListener('click', function() {
            pipes.reset();
            bird.y = 250;
            bird.velocity = 0;
            score = 0;
            liveScoreEl.innerText = score;
            state.current = state.getReady;
            gameOverScreen.classList.add('hidden');
            liveScoreEl.classList.add('hidden');
            startScreen.classList.remove('hidden');
        });

        // دالة إظهار الخسارة وتحديث أعلى نتيجة
        function showGameOver() {
            liveScoreEl.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            finalScoreEl.innerText = score;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappy_best_score', bestScore);
            }
            bestScoreEl.innerText = bestScore;
        }

        // بدء الحلقة
        loop();

    </script>
</body>
</html>
